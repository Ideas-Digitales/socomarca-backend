name: QA Deployment

on:
  push:
    branches: [ "qa" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: qa

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository name
      run: echo "repo_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ghcr.io/${{ env.repo_name }}:qa
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: qa

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set lowercase repository name
      run: echo "repo_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    # 🔐 SSH
    - name: Test SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

        ssh -vvv -i ~/.ssh/id_ed25519 \
          -o IdentitiesOnly=yes \
          -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo OK"
        
    # 📦 Crear .env
    - name: Generate .env
      run: |
        cat > .env << EOF
        APP_NAME=${{ vars.APP_NAME }}
        APP_KEY=${{ secrets.APP_KEY }}
        APP_ENV=qa
        APP_DEBUG=true
        APP_URL=${{ vars.APP_URL }}

        DB_CONNECTION=pgsql
        DB_HOST=db
        DB_PORT=5432
        DB_DATABASE=${{ secrets.DB_DATABASE }}
        DB_USERNAME=${{ secrets.DB_USERNAME }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}

        CACHE_STORE=${{ vars.CACHE_STORE }}
        QUEUE_CONNECTION=${{ vars.QUEUE_CONNECTION }}
        SESSION_DRIVER=${{ vars.SESSION_DRIVER }}
        SESSION_DOMAIN=${{ vars.SESSION_DOMAIN }}
        SESSION_ENCRYPT=${{ vars.SESSION_ENCRYPT }}
        SESSION_LIFETIME=${{ vars.SESSION_LIFETIME }}
        SESSION_PATH="${{ vars.SESSION_PATH }}"

        EOF

    # 📤 Subir archivos
    - name: Upload files
      run: |
        export REPO_NAME=${{ env.repo_name }}

        envsubst < compose.qa.yml > compose.tmp.yml

        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ vars.BASE_DIR }}"

        scp compose.tmp.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.BASE_DIR }}/compose.yml
        scp .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.BASE_DIR }}/.env
        scp -r nginx ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.BASE_DIR }}/ || true

    # 📥 Pull + deploy sin downtime
    - name: Clean and deploy containers
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
        set -e
        cd ${{ vars.BASE_DIR }}

        echo "🧹 Cleaning previous deployment..."

        # detener y eliminar contenedores + volúmenes
        docker compose down -v --remove-orphans || true

        # eliminar contenedores huérfanos (por si cambió nombre)
        docker rm -f socomarca_app_qa socomarca_db_qa socomarca_nginx_qa socomarca_worker_qa 2>/dev/null || true

        # limpiar redes no usadas
        docker network prune -f || true

        echo "🔐 Login GHCR..."
        echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

        echo "📥 Pull image..."
        docker pull ghcr.io/${{ env.repo_name }}:qa

        echo "🚀 Starting fresh containers..."
        docker compose up -d --build --remove-orphans

        echo "📊 Containers status:"
        docker compose ps
        ENDSSH

    # 🧱 Migraciones con rollback automático
    - name: Run database migrations
      env:
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_HOST: ${{ secrets.SSH_HOST }}
        BASE_DIR: ${{ vars.BASE_DIR }}
      run: |
        ssh $SSH_USER@$SSH_HOST "cd ${{ vars.BASE_DIR }} && docker compose run --rm app php artisan migrate --force --database=pgsql"

    - name: Debug network
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
        cd ${{ vars.BASE_DIR }}
        docker compose exec app getent hosts db || true
        docker compose exec app ping -c 1 db || true
        docker compose logs db --tail=50
        ENDSSH

    # ⚡ Optimización
    - name: Optimize Laravel
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
        "cd ${{ vars.BASE_DIR }} && docker compose exec -T app php artisan optimize"

    # ❤️ Healthcheck real
    - name: Health check
      run: |
        sleep 10
        curl -f "${{ vars.APP_URL }}/health" || exit 1

    # 📜 Logs finales
    - name: Show logs
      if: always()
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
        "cd ${{ vars.BASE_DIR }} && docker compose logs --tail=100"
