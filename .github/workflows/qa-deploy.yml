name: QA Deployment

on:
  push:
    branches: [ "qa" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: qa

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository name
      run: echo "repo_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile.deploy
        push: true
        tags: ghcr.io/${{ env.repo_name }}:qa
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: qa

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set lowercase repository name
      run: echo "repo_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    # 🔐 SSH
    - name: Test SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

        ssh -vvv -i ~/.ssh/id_ed25519 \
          -o IdentitiesOnly=yes \
          -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo OK"

    # 📦 Crear .env
    - name: Generate .env
      run: |
        cat > .env << EOF
        APP_NAME=${{ vars.APP_NAME }}
        APP_KEY=${{ secrets.APP_KEY }}
        APP_ENV=${{ vars.APP_ENV }}
        APP_DEBUG=false
        APP_URL=${{ vars.APP_URL }}

        DB_CONNECTION=pgsql
        DB_HOST=${{ secrets.DB_HOST }}
        DB_PORT=5432
        DB_DATABASE=${{ secrets.DB_DATABASE }}
        DB_USERNAME=${{ secrets.DB_USERNAME }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}

        CACHE_STORE=${{ vars.CACHE_STORE }}
        QUEUE_CONNECTION=${{ vars.QUEUE_CONNECTION }}
        SESSION_DRIVER=${{ vars.SESSION_DRIVER }}
        SESSION_DOMAIN=${{ vars.SESSION_DOMAIN }}
        SESSION_ENCRYPT=${{ vars.SESSION_ENCRYPT }}
        SESSION_LIFETIME=${{ vars.SESSION_LIFETIME }}
        SESSION_PATH="${{ vars.SESSION_PATH }}"

        RANDOM_ERP_TOKEN=${{ secrets.RANDOM_ERP_TOKEN }}
        RANDOM_ERP_BUSINESS_CODE=${{ secrets.RANDOM_ERP_BUSINESS_CODE }}
        RANDOM_ERP_PRICES_MODALITY=${{ secrets.RANDOM_ERP_PRICES_MODALITY }}
        RANDON_ERP_WAREHOUSE_CODE=${{ secrets.RANDON_ERP_WAREHOUSE_CODE }}
        RANDOM_MOCK_DOCS=${{ vars.RANDOM_MOCK_DOCS }}
        RANDOM_MOCK_DOCS_RESPONSE_BAD=${{ vars.RANDOM_MOCK_DOCS_RESPONSE_BAD }}
        RANDOM_MOCK_CREDIT_BRANCH=${{ vars.RANDOM_MOCK_CREDIT_BRANCH }}



        EOF

    # 📤 Subir archivos
    - name: Upload files
      run: |
        export REPO_NAME=${{ env.repo_name }}
        export APP_HOST=$(echo "${{ vars.APP_URL }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')

        envsubst '${REPO_NAME} ${APP_HOST}' < compose.deploy.yml > compose.tmp.yml

        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ vars.BASE_DIR }}"

        scp compose.tmp.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.BASE_DIR }}/compose.yml
        scp .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.BASE_DIR }}/.env

    # 📥 Pull + deploy sin downtime
    - name: Clean and deploy containers
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
        set -e
        cd ${{ vars.BASE_DIR }}

        echo "🔐 Login GHCR..."
        echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

        echo "📥 Pull image..."
        docker pull ghcr.io/${{ env.repo_name }}:qa

        echo "🚀 Starting fresh containers..."
        docker compose up -d --remove-orphans

        echo "🧹 Removing old images..."
        docker image prune -f

        echo "📊 Containers status:"
        docker compose ps
        ENDSSH

    # 🧱 Migraciones con rollback automático
    - name: Run database migrations
      env:
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_HOST: ${{ secrets.SSH_HOST }}
        BASE_DIR: ${{ vars.BASE_DIR }}
        APP_ENV: ${{ vars.APP_ENV }}
      run: |
        ssh $SSH_USER@$SSH_HOST "
          set -e
          cd $BASE_DIR
          echo 'Running safe migrations...'
          docker compose exec -T app php artisan migrate --force --seed
        "

    # ⚡ Optimización
    - name: Optimize Laravel
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
        "cd ${{ vars.BASE_DIR }} && docker compose exec -T app php artisan optimize"

    # ❤️ Health check interno (Docker)
    - name: Health check
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ vars.BASE_DIR }}
          echo 'Verifying HTTP response (internal)...'
          docker compose exec -T app wget --spider -q http://localhost:80/up || exit 1
        "

    # 📜 Logs finales
    - name: Show logs
      if: always()
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
        "cd ${{ vars.BASE_DIR }} && docker compose logs --tail=100"
