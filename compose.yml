services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80" # HTTP
      - "8443:443" # HTTPS
      - "8443:443/udp" # HTTP/3
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # comente la siguiente línea en producción, permite tener logs legibles en desarrollo
    tty: true
    depends_on:
      - db
    networks:
      - socomarca

  db:
    image: postgres
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - socomarca_data:/var/lib/postgresql/data
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728 # 128MB
      - ./docker/postgresql/init.sh:/docker-entrypoint-initdb.d/init.sh
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    networks:
      - socomarca

  localstack:
    image: localstack/localstack
    container_name: socomarca_localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    networks:
      - socomarca

volumes:
  socomarca_data:
    name: socomarca_data
  socomarca_s3_data:
    name: socomarca_s3_data
  caddy_config:
  caddy_data:

networks:
  socomarca:
